version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
    ports:
      - "3001:3001"
    restart: unless-stopped
  redis:
    image: redis
    container_name: redis-server
    ports:
      - "6379:6379"
    restart: unless-stopped
    volumes:
      - redis_data:/data


volumes:
  redis_data: